<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gIAm - Train Smarter</title>
    <style>
        :root { --bg-color: #0d0f12; --panel-bg: #1a1d24; --neon-cyan: #00f0ff; --neon-purple: #9d00ff; --text-main: #ffffff; --text-muted: #8892b0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; text-align: center; }
        
        header img { max-width: 150px; margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        
        .panel { background-color: var(--panel-bg); border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: left; }
        .btn-rutina { width: 100%; padding: 20px; margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; color: #fff; background-color: var(--panel-bg); border: 2px solid var(--neon-cyan); border-radius: 12px; cursor: pointer; text-transform: uppercase; }
        
        #workout-view { display: none; }
        .exercise-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .exercise-title { font-size: 1.2rem; color: var(--neon-cyan); font-weight: bold; }
        
        .media-thumbnail { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--neon-purple); cursor: pointer; display: none; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background-color: #000; color: #fff; font-size: 1rem; }
        
        .btn-save { width: 100%; padding: 15px; background-color: var(--neon-cyan); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px; }
        .btn-next { width: 100%; padding: 10px; background-color: transparent; color: var(--text-muted); border: 1px solid #333; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .btn-finish { width: 100%; padding: 15px; background-color: var(--neon-purple); color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        #timer-box { font-size: 2rem; color: var(--neon-cyan); font-weight: bold; margin: 15px 0; display: none; text-align: center; }
        
        #active-timer-box { background-color: #000; border: 1px solid var(--neon-purple); border-radius: 10px; padding: 15px; margin-bottom: 15px; text-align: center; display: none; }
        #active-timer-display { font-size: 2.5rem; color: var(--neon-purple); font-weight: bold; }
        .btn-stop-timer { margin-top: 10px; padding: 8px 15px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); border-radius: 5px; cursor: pointer; }

        #sync-status { font-size: 0.8rem; margin-top: 20px; color: var(--text-muted); text-align: center; }

        #media-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #media-modal img { max-width: 95%; max-height: 80%; border-radius: 10px; border: 2px solid var(--neon-cyan); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 3rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/SDgmnJjz/e4bf9f94-cf91-4f27-99cb-a3b90e174009-removebg-preview.png" alt="gIAm Logo">
        <div class="subtitle">Train Smarter</div>
    </header>

    <div id="dashboard">
        <h2 style="font-size: 1.1rem; margin-bottom: 15px;">Selecciona tu rutina</h2>
        <div id="rutinas-container">Cargando datos...</div>
    </div>

    <div id="workout-view">
        <div id="timer-box">01:30</div>
        
        <div class="panel">
            <div class="exercise-header">
                <span class="exercise-title" id="lbl-ejercicio">Ejercicio</span>
                <img id="img-thumbnail" class="media-thumbnail" src="" alt="Muestra" onclick="abrirModal()">
            </div>
            
            <div id="active-timer-box">
                <div style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Tiempo en curso</div>
                <div id="active-timer-display">00:00</div>
                <button class="btn-stop-timer" onclick="detenerTimerActivo()">Detener Cronómetro</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Serie</label>
                    <input type="text" id="input-serie" value="1">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Reps / Min</label>
                    <input type="text" id="input-reps" placeholder="0">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Peso (kg)</label>
                    <input type="text" id="input-peso" placeholder="0">
                </div>
            </div>
            <button class="btn-save" onclick="guardarSerie()">Guardar Serie y Descansar</button>
            <button class="btn-next" onclick="siguienteEjercicio()">Siguiente Ejercicio ></button>
        </div>
        <button class="btn-finish" onclick="finalizarRutina()">Finalizar Entrenamiento</button>
    </div>

    <div id="sync-status"></div>

    <div id="media-modal">
        <span class="close-modal" onclick="cerrarModal()">&times;</span>
        <img id="modal-img" src="" alt="Vista ampliada">
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwREc08RbJ65onsF4cWOaVcE6OKAupOk-Cc_KdggnkCxZvhJGncAZNHZGMNh4SIk4C7/exec';
        
        let datosApp = { rutinas: [], catalogo: [], historial: {} };
        let offlineQueue = JSON.parse(localStorage.getItem('giam_queue')) || [];
        let rutinaActiva = [];
        let indexEjercicioActual = 0;
        let timerDescanso;
        let timerActivo;

        async function inicializar() {
            actualizarEstadoRed();
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                datosApp = await response.json();
                localStorage.setItem('giam_datos', JSON.stringify(datosApp));
                renderizarRutinas();
            } catch (error) {
                const datosGuardados = localStorage.getItem('giam_datos');
                if (datosGuardados) {
                    datosApp = JSON.parse(datosGuardados);
                    renderizarRutinas();
                } else {
                    document.getElementById('rutinas-container').innerText = 'Sin conexión y sin datos previos.';
                }
            }
        }

        function renderizarRutinas() {
            const container = document.getElementById('rutinas-container');
            container.innerHTML = '';
            if (datosApp.rutinas && datosApp.rutinas.length > 0) {
                datosApp.rutinas.forEach(rutina => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-rutina';
                    btn.innerText = rutina;
                    btn.onclick = () => iniciarRutina(rutina);
                    container.appendChild(btn);
                });
            } else {
                container.innerHTML = '<p>No hay rutinas en el catálogo.</p>';
            }
        }

        function iniciarRutina(nombreRutina) {
            rutinaActiva = datosApp.catalogo.filter(item => item.rutina === nombreRutina).sort((a, b) => a.orden - b.orden);
            if (rutinaActiva.length === 0) return alert("Esta rutina no tiene ejercicios.");
            
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('workout-view').style.display = 'block';
            indexEjercicioActual = 0;
            cargarEjercicioActivo();
        }

        function cargarEjercicioActivo() {
            detenerTimerDescanso();
            detenerTimerActivo();
            const ej = rutinaActiva[indexEjercicioActual];
            document.getElementById('lbl-ejercicio').innerText = ej.ejercicio;
            
            const imgThumb = document.getElementById('img-thumbnail');
            if(ej.media && ej.media.includes('http')) { 
                imgThumb.src = ej.media;
                document.getElementById('modal-img').src = ej.media;
                imgThumb.style.display = 'block'; 
            } else { 
                imgThumb.style.display = 'none'; 
            }

            const hist = datosApp.historial[ej.ejercicio];
            const prevSerie = hist && hist.serie ? hist.serie : '1';
            const prevReps = hist && hist.reps ? String(hist.reps) : '';
            
            document.getElementById('input-serie').value = prevSerie;
            document.getElementById('input-reps').value = prevReps;
            document.getElementById('input-peso').value = hist && hist.peso ? hist.peso : '';

            document.getElementById('active-timer-box').style.display = 'none';

            if (prevReps.includes('min')) {
                const minutos = parseInt(prevReps.replace(/\D/g, ''));
                if (!isNaN(minutos) && minutos > 0) {
                    iniciarTimerActivo(minutos * 60);
                }
            }
        }

        function abrirModal() { document.getElementById('media-modal').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('media-modal').style.display = 'none'; }

        function siguienteEjercicio() {
            if (indexEjercicioActual < rutinaActiva.length - 1) {
                indexEjercicioActual++;
                cargarEjercicioActivo();
            } else {
                alert("Último ejercicio de la rutina. Finaliza cuando estés listo.");
            }
        }

        function guardarSerie() {
            const ej = rutinaActiva[indexEjercicioActual].ejercicio;
            const serie = document.getElementById('input-serie').value;
            const reps = document.getElementById('input-reps').value;
            const peso = document.getElementById('input-peso').value;

            if(!reps || !peso) return alert("Ingresa repeticiones y peso.");

            offlineQueue.push({ fecha: new Date().toISOString(), ejercicio: ej, serie: serie, repeticiones: reps, peso: peso });
            localStorage.setItem('giam_queue', JSON.stringify(offlineQueue));
            
            const numSerie = parseInt(serie.replace(/\D/g, ''));
            if (!isNaN(numSerie)) {
                document.getElementById('input-serie').value = 'Serie ' + (numSerie + 1);
            } else {
                document.getElementById('input-serie').value = serie; 
            }
            
            detenerTimerActivo();
            iniciarTimerDescanso(90); 
            sincronizarDatos();
        }

        function iniciarTimerActivo(segundos) {
            document.getElementById('active-timer-box').style.display = 'block';
            const display = document.getElementById('active-timer-display');
            let restantes = segundos;
            
            timerActivo = setInterval(() => {
                const m = String(Math.floor(restantes / 60)).padStart(2, '0');
                const s = String(restantes % 60).padStart(2, '0');
                display.innerText = `${m}:${s}`;
                if (restantes <= 0) { 
                    detenerTimerActivo(); 
                    alert("¡Tiempo cumplido!"); 
                }
                restantes--;
            }, 1000);
        }

        function detenerTimerActivo() {
            clearInterval(timerActivo);
        }

        function iniciarTimerDescanso(segundos) {
            detenerTimerDescanso();
            const box = document.getElementById('timer-box');
            box.style.display = 'block';
            let restantes = segundos;
            
            timerDescanso = setInterval(() => {
                const min = String(Math.floor(restantes / 60)).padStart(2, '0');
                const sec = String(restantes % 60).padStart(2, '0');
                box.innerText = `Descanso: ${min}:${sec}`;
                if (restantes <= 0) { detenerTimerDescanso(); box.innerText = "¡A darle!"; }
                restantes--;
            }, 1000);
        }

        function detenerTimerDescanso() {
            clearInterval(timerDescanso);
            document.getElementById('timer-box').style.display = 'none';
        }

        function finalizarRutina() {
            document.getElementById('workout-view').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            detenerTimerDescanso();
            detenerTimerActivo();
            alert("¡Entrenamiento guardado!");
            sincronizarDatos();
        }

        async function sincronizarDatos() {
            if (!navigator.onLine || offlineQueue.length === 0) { actualizarEstadoRed(); return; }
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify([...offlineQueue]),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await response.json();
                if (result.status === 'ok') {
                    offlineQueue = [];
                    localStorage.setItem('giam_queue', JSON.stringify(offlineQueue));
                }
            } catch (e) { console.error(e); }
            actualizarEstadoRed();
        }

        function actualizarEstadoRed() {
            const div = document.getElementById('sync-status');
            div.innerText = navigator.onLine ? `Online - Pendientes: ${offlineQueue.length}` : `Offline - Guardados: ${offlineQueue.length}`;
        }

        window.addEventListener('online', sincronizarDatos);
        window.addEventListener('offline', actualizarEstadoRed);
        
        inicializar();
    </script>
</body>
</html>
