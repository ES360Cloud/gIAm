<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gIAm - Train Smarter</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --panel-bg: #1a1d24;
            --neon-cyan: #00f0ff;
            --neon-purple: #9d00ff;
            --text-main: #ffffff;
            --text-muted: #8892b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; text-align: center; }
        
        header img { max-width: 180px; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
        
        #rutinas-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        .btn-rutina {
            width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold;
            color: #fff; background-color: var(--panel-bg);
            border: 2px solid var(--neon-cyan); border-radius: 12px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1); transition: 0.3s;
        }
        .btn-rutina:hover { background-color: var(--neon-cyan); color: #000; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        
        #loading { color: var(--neon-purple); font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/SDgmnJjz/e4bf9f94-cf91-4f27-99cb-a3b90e174009-removebg-preview.png" alt="gIAm Logo">
        <div class="subtitle">Train Smarter</div>
    </header>

    <div>
        <h2 style="font-size: 1.2rem; color: var(--text-main); margin-bottom: 10px;">¿Qué entrenamiento vas a hacer hoy?</h2>
        <div id="loading">Conectando con tu plan...</div>
        <div id="rutinas-container"></div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwREc08RbJ65onsF4cWOaVcE6OKAupOk-Cc_KdggnkCxZvhJGncAZNHZGMNh4SIk4C7/exec';

        async function cargarRutinas() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('rutinas-container');

                if (data.status === 'ok' && data.rutinas.length > 0) {
                    data.rutinas.forEach(rutina => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-rutina';
                        btn.innerText = rutina;
                        btn.onclick = () => iniciarBloque(rutina);
                        container.appendChild(btn);
                    });
                } else {
                    container.innerHTML = '<p style="color: var(--text-muted);">No hay rutinas cargadas en el catálogo aún.</p>';
                }
            } catch (error) {
                document.getElementById('loading').innerText = 'Error al cargar rutinas. Verifica la conexión.';
            }
        }

        function iniciarBloque(nombreRutina) {
            alert("Seleccionaste: " + nombreRutina + ". En la Etapa 2 abriremos los ejercicios aquí.");
        }

        cargarRutinas();
    </script>
</body>
</html>
