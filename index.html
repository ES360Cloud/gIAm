<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gIAm - Train Smarter</title>
    <link rel="icon" href="https://i.ibb.co/nTVtbn9/logo-sin-fondo-y-sin-la-frase.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-color: #f0f4f8; 
            --panel-bg: #ffffff; 
            --primary: #0047a5; 
            --primary-light: #e6f0fa;
            --accent: #00e5ff;
            --success: #10b981;
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --border: #e2e8f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif !important; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; padding-bottom: 120px; }
        
        header { display: flex; justify-content: center; align-items: center; min-height: 60px; margin-bottom: 20px; }
        header img { max-width: 120px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.05)); }
        
        .dash-card { background-color: var(--panel-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .dash-header { font-size: 1.05rem; font-weight: 700; margin-bottom: 15px; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .heatmap-box { aspect-ratio: 1; border-radius: 6px; background-color: #e2e8f0; transition: transform 0.2s; cursor: pointer; }
        .heatmap-box.active { background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 2px 5px rgba(0, 229, 255, 0.3); }
        .heatmap-box:active { transform: scale(0.9); }
        
        .btn-main-action { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--primary), #0056c7); color: #fff; border: none; border-radius: 14px; font-weight: 700; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 8px 20px rgba(0, 71, 165, 0.25); transition: transform 0.2s; margin-bottom: 10px; }
        .btn-main-action:active { transform: scale(0.97); }

        .btn-rutina { width: 100%; padding: 18px; margin-bottom: 12px; font-size: 1.05rem; font-weight: 600; color: var(--text-main); background-color: var(--panel-bg); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: border-color 0.2s; }
        .btn-rutina:active { border-color: var(--primary); }
        
        .progress-container { width: 100%; background-color: var(--border); border-radius: 10px; margin-bottom: 25px; overflow: hidden; height: 10px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.4s ease; border-radius: 10px; }
        .progress-text { text-align: right; font-size: 0.85rem; color: var(--primary); margin-bottom: 8px; font-weight: 700; }

        .exercise-card { background-color: var(--panel-bg); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow: hidden; }
        .ex-header { display: flex; justify-content: space-between; align-items: center; padding: 18px; cursor: pointer; background-color: var(--panel-bg); }
        .ex-title-box { display: flex; flex-direction: column; }
        .ex-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .ex-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
        
        .ex-body { display: none; border-top: 1px solid var(--border); background-color: #f8fafc; }
        .ex-body.open { display: block; }
        
        .series-header { display: flex; padding: 10px 18px 5px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .col-serie { flex: 0 0 60px; }
        .col-valor { flex: 1; padding: 0 5px; }
        .col-peso { flex: 0 0 70px; text-align: center; }
        .col-action { flex: 0 0 50px; text-align: right; }

        .series-row { display: flex; align-items: center; padding: 10px 18px; border-bottom: 1px solid var(--border); }
        .series-row.completed { background-color: #ecfdf5; } 
        
        .input-compact { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.95rem; text-align: center; outline: none; font-weight: 600; color: var(--text-main); transition: border-color 0.2s; }
        .input-compact:focus { border-color: var(--accent); }
        .select-compact { width: 100%; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.8rem; margin-top: 4px; font-weight: 500; color: var(--text-muted); }
        
        .btn-play { width: 38px; height: 38px; border-radius: 50%; border: none; background-color: var(--primary-light); color: var(--primary); display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .series-row.completed .btn-play { background-color: var(--success); color: #fff; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .btn-play:active { transform: scale(0.9); }

        .btn-add-serie { width: 100%; padding: 15px; background: none; border: none; color: var(--primary); font-weight: 700; font-size: 0.95rem; cursor: pointer; border-bottom: 1px solid var(--border); }
        .active-timer-display { font-size: 2.2rem; text-align: center; color: var(--primary); font-weight: 700; margin: 15px 0; display: none; }
        
        .workout-footer { position: fixed; bottom: 70px; left: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 90; }
        .btn-finish { padding: 16px 20px; background: linear-gradient(90deg, var(--primary), var(--accent)); color: #fff; border: none; border-radius: 12px; font-weight: 700; flex: 1; text-align: center; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); cursor: pointer; text-transform: uppercase; font-size: 0.95rem; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--panel-bg); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 100; box-shadow: 0 -4px 15px rgba(0,0,0,0.03); }
        .nav-item { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); }

        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background-color: var(--panel-bg); border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 30px 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200; }
        .bottom-sheet.open { bottom: 0; }
        .sheet-close { position: absolute; top: 15px; right: 25px; font-size: 1.8rem; color: var(--text-muted); cursor: pointer; }
        .sheet-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        .sheet-data { font-size: 1rem; margin-bottom: 10px; color: var(--text-main); font-weight: 500; }
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); z-index: 150; display: none; }

        .filter-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-btn { width: 100%; padding: 14px; background-color: var(--text-main); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: background-color 0.2s; }
        .filter-btn:active { background-color: var(--primary); }

        #view-dashboard, #view-selector, #view-workout, #view-history { display: none; }
        #view-dashboard { display: block; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/nTVtbn9/logo-sin-fondo-y-sin-la-frase.png" alt="gIAm Logo">
    </header>

    <div id="view-dashboard">
        <button class="btn-main-action" id="btn-start-workout" onclick="navegarA('selector')">+ Iniciar Sesión</button>
        <div id="sync-status" style="text-align:center; font-size:0.75rem; color:var(--text-muted); margin-bottom: 20px; font-weight: 600;"></div>
        
        <div class="dash-card">
            <div class="dash-header">Asistencia (Últimos 28 días)</div>
            <div class="heatmap-grid" id="heatmap-container"></div>
        </div>
        <div id="charts-container"></div>
    </div>

    <div id="view-selector">
        <div class="dash-header" style="color:var(--text-muted); cursor:pointer; margin-bottom:20px; font-size: 0.9rem;" onclick="navegarA('dashboard')">← VOLVER</div>
        <div class="dash-header">Selecciona tu Programa</div>
        <div id="rutinas-container">Cargando catálogo...</div>
    </div>

    <div id="view-workout">
        <div class="progress-text"><span id="progress-text-val">0</span>% Entrenamiento</div>
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="exercise-list"></div>
        <div class="workout-footer">
            <div id="global-rest-timer" style="font-size: 1.4rem; color: var(--text-main); font-weight: 700; margin-right: 20px; display: none;">00:00</div>
            <div class="btn-finish" onclick="finalizarRutina()">Terminar Rutina</div>
        </div>
    </div>

    <div id="view-history">
        <div class="dash-card">
            <div class="dash-header">Filtros Históricos</div>
            <div class="filter-group">
                <select class="input-compact" id="filt-mes">
                    <option value="Todos">Mes: Todos</option>
                    <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                    <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                    <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                    <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select>
                <select class="input-compact" id="filt-rutina">
                    <option value="Todas">Rutina: Todas</option>
                </select>
            </div>
            <button class="filter-btn" onclick="aplicarFiltro()">Aplicar Filtro</button>
        </div>
        <div class="dash-card">
            <canvas id="hist-chart" height="220"></canvas>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-dashboard" onclick="navegarA('dashboard')">Inicio</div>
        <div class="nav-item" id="nav-history" onclick="navegarA('history')">Historial</div>
    </div>

    <div class="sheet-overlay" id="sheet-overlay" onclick="cerrarSheet()"></div>
    <div class="bottom-sheet" id="heatmap-sheet">
        <span class="sheet-close" onclick="cerrarSheet()">&times;</span>
        <div class="sheet-title" id="sheet-title">Fecha</div>
        <div class="sheet-data" id="sheet-rutinas">Rutinas: -</div>
        <div class="sheet-data" id="sheet-series">Series completadas: -</div>
        <div class="sheet-data" id="sheet-volumen">Volumen (kg): -</div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwREc08RbJ65onsF4cWOaVcE6OKAupOk-Cc_KdggnkCxZvhJGncAZNHZGMNh4SIk4C7/exec';
        
        Chart.defaults.font.family = "'Montserrat', sans-serif";
        Chart.defaults.color = '#64748b';
        Chart.defaults.scale.grid.color = 'rgba(226, 232, 240, 0.5)';
        
        const customTooltip = {
            backgroundColor: 'rgba(15, 23, 42, 0.9)',
            titleFont: { size: 13, family: "'Montserrat', sans-serif", weight: 'bold' },
            bodyFont: { size: 12, family: "'Montserrat', sans-serif" },
            padding: 12,
            cornerRadius: 8,
            displayColors: false
        };

        let datosApp = { rutinas: [], catalogo: [], historial: {}, heatmap: {}, stats: {} };
        let offlineQueue = JSON.parse(localStorage.getItem('giam_queue')) || [];
        
        let rutinaActiva = [];
        let entrenamientoEnCurso = false;
        let globalRestInterval;
        let activeTimers = {}; 
        let seriesTotales = 0;
        let seriesCompletadas = 0;
        let chartInstances = [];
        let historyChart;

        async function inicializar() {
            actualizarEstadoRed();
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                datosApp = await response.json();
                localStorage.setItem('giam_datos', JSON.stringify(datosApp));
                renderizarTodo();
            } catch (error) {
                const guardados = localStorage.getItem('giam_datos');
                if (guardados) { datosApp = JSON.parse(guardados); renderizarTodo(); } 
            }
        }

        function renderizarTodo() {
            renderizarRutinas();
            renderizarHeatmap();
            renderizarGraficosDashboard();
            llenarFiltros();
        }

        function navegarA(vista) {
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-selector').style.display = 'none';
            document.getElementById('view-workout').style.display = 'none';
            document.getElementById('view-history').style.display = 'none';
            
            document.getElementById('nav-dashboard').classList.remove('active');
            document.getElementById('nav-history').classList.remove('active');

            if (vista === 'dashboard') {
                if(entrenamientoEnCurso) {
                    document.getElementById('btn-start-workout').innerText = '▶ Retomar Entrenamiento';
                    document.getElementById('btn-start-workout').onclick = () => navegarA('workout');
                } else {
                    document.getElementById('btn-start-workout').innerText = '+ Iniciar Sesión';
                    document.getElementById('btn-start-workout').onclick = () => navegarA('selector');
                }
                document.getElementById('view-dashboard').style.display = 'block';
                document.getElementById('nav-dashboard').classList.add('active');
            } else if (vista === 'selector') {
                document.getElementById('view-selector').style.display = 'block';
            } else if (vista === 'workout') {
                document.getElementById('view-workout').style.display = 'block';
            } else if (vista === 'history') {
                document.getElementById('view-history').style.display = 'block';
                document.getElementById('nav-history').classList.add('active');
                if(!historyChart) aplicarFiltro();
            }
        }

        function renderizarHeatmap() {
            const container = document.getElementById('heatmap-container');
            container.innerHTML = '';
            for (let i = 27; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateKey = d.toLocaleDateString('es-ES', { month: 'short', day: 'numeric' });
                
                const dataDia = datosApp.heatmap[dateKey];
                const box = document.createElement('div');
                box.className = `heatmap-box ${dataDia ? 'active' : ''}`;
                
                if (dataDia) {
                    box.onclick = () => abrirSheet(dataDia);
                }
                container.appendChild(box);
            }
        }

        function abrirSheet(data) {
            document.getElementById('sheet-title').innerText = data.fechaStr;
            document.getElementById('sheet-rutinas').innerHTML = `<strong>Rutinas:</strong> ${data.rutinas.join(', ')}`;
            document.getElementById('sheet-series').innerHTML = `<strong>Series completadas:</strong> ${data.series}`;
            document.getElementById('sheet-volumen').innerHTML = `<strong>Volumen Total:</strong> ${data.volumen.toLocaleString()} kg`;
            document.getElementById('heatmap-sheet').classList.add('open');
            document.getElementById('sheet-overlay').style.display = 'block';
        }

        function cerrarSheet() {
            document.getElementById('heatmap-sheet').classList.remove('open');
            document.getElementById('sheet-overlay').style.display = 'none';
        }

        function renderizarGraficosDashboard() {
            const container = document.getElementById('charts-container');
            container.innerHTML = '';
            chartInstances.forEach(c => c.destroy());
            chartInstances = [];

            if(datosApp.stats) {
                Object.keys(datosApp.stats).forEach(rutina => {
                    const data = datosApp.stats[rutina];
                    if (data.fechas.length === 0) return;
                    
                    const card = document.createElement('div');
                    card.className = 'dash-card';
                    card.innerHTML = `<div class="dash-header">Volumen: ${rutina}</div><canvas id="chart-${rutina}" height="180"></canvas>`;
                    container.appendChild(card);

                    const ctx = document.getElementById(`chart-${rutina}`).getContext('2d');
                    
                    let gradient = ctx.createLinearGradient(0, 0, 0, 180);
                    gradient.addColorStop(0, 'rgba(0, 229, 255, 0.4)');
                    gradient.addColorStop(1, 'rgba(0, 71, 165, 0.0)');

                    const chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.fechas,
                            datasets: [{ 
                                label: 'Carga (kg x reps)', 
                                data: data.volumen, 
                                borderColor: '#0047a5', 
                                backgroundColor: gradient, 
                                borderWidth: 3, 
                                tension: 0.4, 
                                fill: true, 
                                pointBackgroundColor: '#ffffff',
                                pointBorderColor: '#00e5ff',
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }]
                        },
                        options: { 
                            responsive: true, 
                            plugins: { 
                                legend: { display: false },
                                tooltip: customTooltip 
                            }, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                y: { beginAtZero: true, border: {display: false} } 
                            } 
                        }
                    });
                    chartInstances.push(chart);
                });
            }
        }

        function llenarFiltros() {
            const selectRut = document.getElementById('filt-rutina');
            selectRut.innerHTML = '<option value="Todas">Rutina: Todas</option>';
            datosApp.rutinas.forEach(r => { selectRut.innerHTML += `<option value="${r}">${r}</option>`; });
            selectRut.innerHTML += `<option value="Libre">Libre</option>`;
        }

        async function aplicarFiltro() {
            if(!navigator.onLine) return alert("Necesitas conexión para consultar el histórico en la nube.");
            const btn = document.querySelector('.filter-btn');
            btn.innerText = 'Consultando datos...';
            
            const payload = {
                action: 'filter',
                mes: document.getElementById('filt-mes').value,
                rutina: document.getElementById('filt-rutina').value,
                ejercicio: 'Todos'
            };

            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                
                if (historyChart) historyChart.destroy();
                const ctx = document.getElementById('hist-chart').getContext('2d');
                
                let barGradient = ctx.createLinearGradient(0, 0, 0, 200);
                barGradient.addColorStop(0, '#00e5ff');
                barGradient.addColorStop(1, '#0047a5');

                historyChart = new Chart(ctx, {
                    type: 'bar',
                    data: { 
                        labels: data.fechas, 
                        datasets: [{ 
                            label: 'Carga Total', 
                            data: data.volumen, 
                            backgroundColor: barGradient, 
                            borderRadius: 6,
                            borderSkipped: false
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        plugins: { 
                            legend: { display: false },
                            tooltip: customTooltip
                        },
                        scales: { 
                            x: { grid: { display: false } }, 
                            y: { beginAtZero: true, border: {display: false} } 
                        }
                    }
                });
            } catch(e) {}
            btn.innerText = 'Aplicar Filtro';
        }

        function renderizarRutinas() {
            const container = document.getElementById('rutinas-container');
            container.innerHTML = '';
            datosApp.rutinas.forEach(rutina => {
                const btn = document.createElement('div');
                btn.className = 'btn-rutina'; btn.innerHTML = `<span>${rutina}</span> <span style="color:var(--primary); font-weight:700;">➔</span>`;
                btn.onclick = () => iniciarRutina(rutina);
                container.appendChild(btn);
            });
        }

        function iniciarRutina(nombreRutina) {
            rutinaActiva = datosApp.catalogo.filter(item => item.rutina === nombreRutina).sort((a, b) => a.orden - b.orden);
            if (rutinaActiva.length === 0) return alert("Rutina sin ejercicios.");
            seriesTotales = 0; seriesCompletadas = 0; entrenamientoEnCurso = true;
            navegarA('workout');
            renderizarListaEntrenamiento();
            actualizarProgreso();
        }

        function renderizarListaEntrenamiento() {
            const list = document.getElementById('exercise-list');
            list.innerHTML = '';
            
            rutinaActiva.forEach((ej, indexEj) => {
                const histList = datosApp.historial[ej.ejercicio] || [{ serie: '1', valor: '', peso: '', unidad: 'repeticiones' }];
                seriesTotales += histList.length;

                const card = document.createElement('div');
                card.className = 'exercise-card';
                
                let rowsHtml = '';
                histList.forEach((s, indexSerie) => { rowsHtml += generarHtmlFilaSerie(indexEj, indexSerie, s.serie, s.valor, s.peso, s.unidad); });

                card.innerHTML = `
                    <div class="ex-header" onclick="toggleBody(${indexEj})">
                        <div class="ex-title-box">
                            <span class="ex-title">${ej.ejercicio}</span>
                            <span class="ex-subtitle" id="subtitle-${indexEj}">${histList.length} series marcadas</span>
                        </div>
                    </div>
                    <div class="ex-body" id="body-${indexEj}">
                        <div id="display-timer-${indexEj}" class="active-timer-display">00:00</div>
                        <div class="series-header"><div class="col-serie">Serie</div><div class="col-valor">Objetivo</div><div class="col-peso">kg</div><div class="col-action"></div></div>
                        <div id="series-container-${indexEj}">${rowsHtml}</div>
                        <button class="btn-add-serie" onclick="agregarFilaSerie(${indexEj})">+ Añadir serie nueva</button>
                    </div>
                `;
                list.appendChild(card);
            });
            if(rutinaActiva.length > 0) toggleBody(0);
        }

        function generarHtmlFilaSerie(indexEj, indexSerie, serieNom, valor, peso, unidad) {
            const numLabel = String(serieNom).replace(/\D/g, '') || (indexSerie + 1);
            return `
                <div class="series-row" id="row-${indexEj}-${indexSerie}">
                    <div class="col-serie"><div style="font-weight:700; color:var(--text-main);">${numLabel}</div><input type="hidden" id="serieNom-${indexEj}-${indexSerie}" value="Serie ${numLabel}"></div>
                    <div class="col-valor"><input type="number" class="input-compact" id="valor-${indexEj}-${indexSerie}" value="${valor}"><select class="select-compact" id="unidad-${indexEj}-${indexSerie}"><option value="repeticiones" ${unidad === 'repeticiones' ? 'selected' : ''}>Reps</option><option value="minutos" ${unidad === 'minutos' ? 'selected' : ''}>Min</option><option value="segundos" ${unidad === 'segundos' ? 'selected' : ''}>Seg</option></select></div>
                    <div class="col-peso"><input type="text" class="input-compact" id="peso-${indexEj}-${indexSerie}" value="${peso}"></div>
                    <div class="col-action"><button class="btn-play" id="btn-play-${indexEj}-${indexSerie}" onclick="ejecutarSerie(${indexEj}, ${indexSerie})">▶</button></div>
                </div>
            `;
        }

        function agregarFilaSerie(indexEj) {
            const container = document.getElementById(`series-container-${indexEj}`);
            const indexSerie = container.children.length;
            container.insertAdjacentHTML('beforeend', generarHtmlFilaSerie(indexEj, indexSerie, `Serie ${indexSerie + 1}`, '', '', 'repeticiones'));
            seriesTotales++; actualizarProgreso();
            document.getElementById(`subtitle-${indexEj}`).innerText = `${indexSerie + 1} series marcadas`;
        }

        function toggleBody(index) {
            const body = document.getElementById(`body-${index}`);
            const isOpen = body.classList.contains('open');
            document.querySelectorAll('.ex-body').forEach(b => b.classList.remove('open'));
            if (!isOpen) body.classList.add('open');
        }

        function ejecutarSerie(indexEj, indexSerie) {
            const row = document.getElementById(`row-${indexEj}-${indexSerie}`);
            const btn = document.getElementById(`btn-play-${indexEj}-${indexSerie}`);
            
            if(row.classList.contains('completed')) {
                row.classList.remove('completed'); btn.innerHTML = '▶';
                document.getElementById(`valor-${indexEj}-${indexSerie}`).disabled = false;
                document.getElementById(`peso-${indexEj}-${indexSerie}`).disabled = false;
                document.getElementById(`unidad-${indexEj}-${indexSerie}`).disabled = false;
                seriesCompletadas--; actualizarProgreso(); return;
            }

            const ej = rutinaActiva[indexEj].ejercicio;
            const serieVal = document.getElementById(`serieNom-${indexEj}-${indexSerie}`).value;
            const valorInp = document.getElementById(`valor-${indexEj}-${indexSerie}`).value;
            const unidadInp = document.getElementById(`unidad-${indexEj}-${indexSerie}`).value;
            const pesoInp = document.getElementById(`peso-${indexEj}-${indexSerie}`).value;

            if(!valorInp) return alert("Carga un valor antes de ejecutar.");

            if(unidadInp === 'minutos' || unidadInp === 'segundos') iniciarTimerActivo(indexEj, valorInp, unidadInp);

            offlineQueue.push({ id: Date.now().toString(), fecha: new Date().toLocaleDateString('es-ES'), ejercicio: ej, serie: serieVal, valor: valorInp, peso: pesoInp || 'N/A', unidad: unidadInp });
            localStorage.setItem('giam_queue', JSON.stringify(offlineQueue));
            
            row.classList.add('completed'); btn.innerHTML = '✔';
            document.getElementById(`valor-${indexEj}-${indexSerie}`).disabled = true;
            document.getElementById(`peso-${indexEj}-${indexSerie}`).disabled = true;
            document.getElementById(`unidad-${indexEj}-${indexSerie}`).disabled = true;

            seriesCompletadas++; actualizarProgreso(); iniciarDescansoGlobal(90); actualizarEstadoRed();
        }

        function iniciarTimerActivo(indexEj, valor, unidad) {
            clearInterval(activeTimers[indexEj]);
            let seg = unidad === 'minutos' ? valor * 60 : parseInt(valor);
            const disp = document.getElementById(`display-timer-${indexEj}`);
            disp.style.display = 'block';
            activeTimers[indexEj] = setInterval(() => {
                disp.innerText = `${String(Math.floor(seg / 60)).padStart(2, '0')}:${String(seg % 60).padStart(2, '0')}`;
                if (seg <= 0) { clearInterval(activeTimers[indexEj]); disp.style.display = 'none'; }
                seg--;
            }, 1000);
        }

        function actualizarProgreso() {
            const pct = seriesTotales === 0 ? 0 : Math.round((seriesCompletadas / seriesTotales) * 100);
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-text-val').innerText = pct;
        }

        function iniciarDescansoGlobal(segundos) {
            clearInterval(globalRestInterval);
            const box = document.getElementById('global-rest-timer');
            box.style.display = 'block';
            let rest = segundos;
            globalRestInterval = setInterval(() => {
                box.innerText = `⏳ ${String(Math.floor(rest / 60)).padStart(2, '0')}:${String(rest % 60).padStart(2, '0')}`;
                if (rest <= 0) { clearInterval(globalRestInterval); box.innerText = "¡A entrenar!"; setTimeout(()=>box.style.display='none', 3000); }
                rest--;
            }, 1000);
        }

        function finalizarRutina() {
            if(!confirm("¿Terminar y registrar esta sesión en la nube?")) return;
            entrenamientoEnCurso = false;
            navegarA('dashboard');
            clearInterval(globalRestInterval);
            document.getElementById('global-rest-timer').style.display = 'none';
            sincronizarDatos();
            setTimeout(inicializar, 2000); 
        }

        async function sincronizarDatos() {
            if (!navigator.onLine || offlineQueue.length === 0) { actualizarEstadoRed(); return; }
            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(offlineQueue) });
                if ((await res.json()).status === 'ok') { offlineQueue = []; localStorage.setItem('giam_queue', '[]'); }
            } catch (e) {}
            actualizarEstadoRed();
        }

        function actualizarEstadoRed() {
            document.getElementById('sync-status').innerText = navigator.onLine ? `Sincronizado. Pendientes: ${offlineQueue.length}` : `Sin conexión. Cola: ${offlineQueue.length}`;
        }

        window.addEventListener('online', sincronizarDatos);
        window.addEventListener('offline', actualizarEstadoRed);
        inicializar();
    </script>
</body>
</html>
